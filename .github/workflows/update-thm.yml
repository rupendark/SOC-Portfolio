name: Update TryHackMe Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Fetch TryHackMe Data
        run: |
          USERNAME="Rupendar"

          RESPONSE=$(curl -s "https://tryhackme.com/api/v2/public-profile?username=$USERNAME")
          echo "$RESPONSE" > thm.json

          RANK=$(jq -r '.data.rank' thm.json)
          ROOMS=$(jq -r '.data.completedRooms' thm.json)
          STREAK=$(jq -r '.data.streak' thm.json)
          BADGES=$(jq -r '.data.badges | length' thm.json)

          echo "## 🔥 TryHackMe Achievements" > thm-stats.md
          echo "" >> thm-stats.md
          echo "![Rank](https://img.shields.io/badge/Rank-Top%20${RANK}%25-brightgreen)" >> thm-stats.md
          echo "![Rooms](https://img.shields.io/badge/Rooms-${ROOMS}-blue)" >> thm-stats.md
          echo "![Streak](https://img.shields.io/badge/Streak-${STREAK}%20Days-orange)" >> thm-stats.md
          echo "![Badges](https://img.shields.io/badge/Badges-${BADGES}-purple)" >> thm-stats.md

          awk '
          /<!-- THM-STATS-START -->/ {print; system("cat thm-stats.md"); skip=1; next}
          /<!-- THM-STATS-END -->/ {skip=0}
          !skip
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Auto-update TryHackMe stats" || echo "No changes"
          git push
