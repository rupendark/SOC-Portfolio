name: Update TryHackMe Stats

on:
  schedule:
    - cron: "0 6 * * *"   # Runs daily
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch TryHackMe Stats
        run: |
          USERNAME="Rupendar"

          curl -s "https://tryhackme.com/api/v2/public-profile?username=$USERNAME" > thm.json

          RANK=$(jq -r '.rank' thm.json)
          ROOMS=$(jq -r '.completedRooms' thm.json)
          STREAK=$(jq -r '.streak' thm.json)
          BADGES=$(jq -r '.badges | length' thm.json)

          cat > thm-stats.md <<EOF
          
## 🔥 TryHackMe Achievements

![Rank](https://img.shields.io/badge/Rank-Top%20${RANK}%25-brightgreen)
![Rooms](https://img.shields.io/badge/Rooms-${ROOMS}-blue)
![Streak](https://img.shields.io/badge/Streak-${STREAK}%20Days-orange)
![Badges](https://img.shields.io/badge/Badges-${BADGES}-purple)
EOF

          awk '
          /<!-- THM-STATS-START -->/ {print; system("cat thm-stats.md"); skip=1; next}
          /<!-- THM-STATS-END -->/ {skip=0}
          !skip
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto-update TryHackMe stats" || echo "No changes"
          git push
