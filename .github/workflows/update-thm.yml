name: Update TryHackMe Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Fetch TryHackMe Data
        run: |
          USERNAME="Rupendar"

          curl -s "https://tryhackme.com/api/v2/public-profile?username=$USERNAME" > thm.json

          RANK=$(jq -r '.data.rank' thm.json)
          TOP=$(jq -r '.data.topPercentage' thm.json)
          ROOMS=$(jq -r '.data.completedRoomsNumber' thm.json)
          STREAK=$(jq -r '.data.streak' thm.json)
          BADGES=$(jq -r '.data.badgesNumber' thm.json)
          BADGE_URL=$(jq -r '.data.badgeImageURL' thm.json)

          echo "## 🔥 TryHackMe Achievements" > thm-stats.md
          echo "" >> thm-stats.md
          echo "![THM Badge]($BADGE_URL)" >> thm-stats.md
          echo "" >> thm-stats.md
          echo "🥇 Rank: $RANK (Top $TOP%)" >> thm-stats.md
          echo "🏠 Rooms Completed: $ROOMS" >> thm-stats.md
          echo "🔥 Streak: $STREAK days" >> thm-stats.md
          echo "🎖 Badges: $BADGES" >> thm-stats.md

          awk '
          /<!-- THM-STATS-START -->/ {print; system("cat thm-stats.md"); skip=1; next}
          /<!-- THM-STATS-END -->/ {skip=0}
          !skip
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Auto-update TryHackMe stats" || echo "No changes"
          git push
